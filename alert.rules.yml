groups:
- name: instances
  rules:
  - alert: InstanceDown
    expr: up == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "Instance {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of job {{ $labels.job }} has been down for more than 1 minute."

- name: api_errors
  rules:
  - alert: HighErrorRate
    expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 5
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High HTTP 5xx Error Rate"
      description: "More than 5 errors generated per second in the last 5 minutes."

- name: api_latency
  rules:
  - alert: HighResponseTime
    expr: rate(http_server_requests_seconds_sum[5m]) / rate(http_server_requests_seconds_count[5m]) > 2.0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High API Response Time"
      description: "Mean response time is > 2 seconds over the past 5 minutes."
